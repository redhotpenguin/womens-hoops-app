name: WNBAGames
options:
  bundleIdPrefix: com.phred
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 3AJVPVCRK8

targets:
  WNBAGamesIOS:
    type: application
    platform: iOS
    sources:
      - path: Shared
        createIntermediateGroups: true
      - WNBAGamesIOS
    dependencies:
      - target: WNBAGamesWidget
    settings:
      base:
        PRODUCT_NAME: WNBAGamesIOS
        PRODUCT_BUNDLE_IDENTIFIER: com.phred.WNBAGamesIOS
        INFOPLIST_FILE: WNBAGamesIOS/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "WNBA Games App Store"

  WNBAGamesWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared/Models
        createIntermediateGroups: true
      - path: Shared/Services
        createIntermediateGroups: true
      - path: Shared/Extensions
        createIntermediateGroups: true
      - WNBAGamesWidget
    settings:
      base:
        PRODUCT_NAME: WNBAGamesWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.phred.WNBAGamesIOS.widget
        INFOPLIST_FILE: WNBAGamesWidget/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "WNBA Games Widget App Store"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  WNBAGamesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - WNBAGamesUITests
    dependencies:
      - target: WNBAGamesIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phred.WNBAGamesIOSUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WNBAGamesIOS
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

schemes:
  WNBAGamesIOS:
    build:
      targets:
        WNBAGamesIOS: all
        WNBAGamesUITests: [test]
    test:
      targets:
        - WNBAGamesUITests
