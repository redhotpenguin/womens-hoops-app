name: WNBAGames
options:
  bundleIdPrefix: com.phred
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 3AJVPVCRK8

targets:
  WNBAGames:
    type: application
    platform: macOS
    sources:
      - WNBAGames
    settings:
      base:
        PRODUCT_NAME: WNBAGames
        PRODUCT_BUNDLE_IDENTIFIER: com.phred.WNBAGames
        INFOPLIST_FILE: WNBAGames/Info.plist
        CODE_SIGN_ENTITLEMENTS: WNBAGames/WNBAGames.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: WNBAGames/WNBAGames.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  WNBAGamesIOS:
    type: application
    platform: iOS
    sources:
      - path: WNBAGames/Models
        createIntermediateGroups: true
      - path: WNBAGames/Services
        createIntermediateGroups: true
      - path: WNBAGames/ViewModels
        createIntermediateGroups: true
      - path: WNBAGames/Extensions
        createIntermediateGroups: true
      - path: WNBAGames/Views/GameRowView.swift
      - path: WNBAGames/Views/EmptyStateView.swift
      - path: WNBAGames/Views/NetworkBadgeView.swift
      - WNBAGamesIOS
    dependencies:
      - target: WNBAGamesWidget
    settings:
      base:
        PRODUCT_NAME: WNBAGamesIOS
        PRODUCT_BUNDLE_IDENTIFIER: com.phred.WNBAGamesIOS
        INFOPLIST_FILE: WNBAGamesIOS/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "WNBA Games App Store"

  WNBAGamesWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WNBAGames/Models
        createIntermediateGroups: true
      - path: WNBAGames/Services
        createIntermediateGroups: true
      - path: WNBAGames/Extensions
        createIntermediateGroups: true
      - WNBAGamesWidget
    settings:
      base:
        PRODUCT_NAME: WNBAGamesWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.phred.WNBAGamesIOS.widget
        INFOPLIST_FILE: WNBAGamesWidget/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "WNBA Games Widget App Store"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
