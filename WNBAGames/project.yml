name: WNBAGames
options:
  bundleIdPrefix: com.phred
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  WNBAGames:
    type: application
    platform: macOS
    sources:
      - WNBAGames
    settings:
      base:
        PRODUCT_NAME: WNBAGames
        PRODUCT_BUNDLE_IDENTIFIER: com.phred.WNBAGames
        INFOPLIST_FILE: WNBAGames/Info.plist
        CODE_SIGN_ENTITLEMENTS: WNBAGames/WNBAGames.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: WNBAGames/WNBAGames.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
